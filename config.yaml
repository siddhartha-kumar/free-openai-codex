# ---------------------------------------------------------------------------
# free-openai-codex gateway configuration
#
# Sections:
#   providers      - how to reach each upstream (base url, key env, paths)
#   routing        - how an incoming model id maps to a provider
#   static_models  - curated extra entries surfaced by GET /v1/models
#   model_aliases  - explicit alias -> {provider, upstream} map (checked first)
#
# Environment variables referenced by `${VAR}` (or `${VAR:-default}`) are
# expanded at load time. The model_aliases block at the bottom was imported
# from the Claude proxy catalog (Ollama Cloud / HuggingFace router / NVIDIA NIM).
# ---------------------------------------------------------------------------

server:
  host: ${GATEWAY_HOST:-0.0.0.0}
  port: ${GATEWAY_PORT:-8080}
  api_key: ${GATEWAY_API_KEY:-}
  request_timeout_seconds: 600

providers:
  # ---- Live providers carried over from the Claude proxy (.env keys) --------
  ollama:
    type: openai_compatible
    base_url: ${OLLAMA_BASE_URL:-https://ollama.com/v1}
    api_key_env: OLLAMA_API_KEY
    chat_path: /chat/completions
    models_path: /models

  huggingface:
    type: openai_compatible
    base_url: ${HUGGINGFACE_BASE_URL:-https://router.huggingface.co/v1}
    api_key_env: HUGGINGFACE_API_KEY
    chat_path: /chat/completions
    models_path: /models

  nvidia:
    type: openai_compatible
    base_url: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
    api_key_env: NVIDIA_API_KEY
    chat_path: /chat/completions
    models_path: /models

  # Modal-hosted inference (modal-* models) - OpenAI-compatible /v1 surface.
  modal:
    type: openai_compatible
    base_url: ${MODAL_BASE_URL:-https://api.us-west-2.modal.direct/v1}
    api_key_env: MODAL_API_KEY
    chat_path: /chat/completions

  ollama_local:
    type: ollama
    base_url: ${OLLAMA_LOCAL_BASE_URL:-http://localhost:11434/api}
    api_key_env: null

  # ---- Additional OpenAI-style providers (optional; add keys to enable) -----
  openai:
    type: openai_compatible
    base_url: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
    api_key_env: OPENAI_API_KEY
    chat_path: /chat/completions
    images_path: /images/generations

  deepseek:
    type: openai_compatible
    base_url: https://api.deepseek.com
    api_key_env: DEEPSEEK_API_KEY
    chat_path: /chat/completions

  perplexity:
    type: openai_compatible
    base_url: https://api.perplexity.ai
    api_key_env: PERPLEXITY_API_KEY
    chat_path: /chat/completions

  moonshot:
    type: openai_compatible
    base_url: https://api.moonshot.ai/v1
    api_key_env: MOONSHOT_API_KEY
    chat_path: /chat/completions

  zai:
    type: openai_compatible
    base_url: https://api.z.ai/api/coding/paas/v4
    api_key_env: ZAI_API_KEY
    chat_path: /chat/completions

# ---------------------------------------------------------------------------
# Routing (evaluated in this order by node_proxy/router.mjs):
#   1. model_aliases  - exact alias match -> (provider, upstream)   [see bottom]
#   2. prefixes       - id starts with "name/" -> provider, prefix stripped
#   3. patterns       - regex on the bare id -> provider, id forwarded as-is
#   4. default_provider
# ---------------------------------------------------------------------------
routing:
  prefixes:
    "oss/": huggingface
    "hf/": huggingface
    "nvidia/": nvidia
    "ollama-local/": ollama_local
    "ollama-cloud/": ollama
  patterns:
    - match: "^gpt-"
      provider: openai
    - match: "^codex-"
      provider: openai
    - match: "^o[0-9]"
      provider: openai
    - match: "^deepseek"
      provider: deepseek
    - match: "^sonar"
      provider: perplexity
    - match: "^(kimi|moonshot)"
      provider: moonshot
    - match: "^glm"
      provider: zai
  default_provider: openai

# ---------------------------------------------------------------------------
# Static catalog surfaced by GET /v1/models (merged with model_aliases and any
# live ollama_local tags). `id` is what Codex sends back as the model.
# ---------------------------------------------------------------------------
static_models:
  # OpenAI / Codex
  - { id: gpt-5.5, owned_by: openai }
  - { id: gpt-5.4, owned_by: openai }
  - { id: gpt-5.4-mini, owned_by: openai }
  - { id: gpt-5.3-codex, owned_by: openai }
  - { id: gpt-5.3-codex-spark, owned_by: openai }
  - { id: gpt-5.2, owned_by: openai }
  - { id: gpt-4.1, owned_by: openai }
  - { id: codex-mini-latest, owned_by: openai }

